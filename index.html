<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>יחידת המטה | אופק 324</title>

<style>
:root{
  --bg1:#050814;
  --bg2:#070b1a;
  --card:rgba(15,20,45,.55);
  --border:rgba(255,255,255,.12);
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.68);
  --glass:rgba(10,12,26,.55);
}

*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:Arial,sans-serif;
  color:var(--text);
  overflow-x:hidden;
  background:transparent;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-3;
  background:
    radial-gradient(circle at 20% 0%, rgba(74,52,160,.35) 0%, transparent 45%),
    radial-gradient(circle at 80% 100%, rgba(120,40,180,.28) 0%, transparent 50%),
    linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
}

.nebula{
  position:fixed;
  inset:-20%;
  z-index:-2;
  pointer-events:none;
  background:
    radial-gradient(circle at 35% 30%, rgba(94,80,255,.08), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(255,70,170,.06), transparent 55%),
    radial-gradient(circle at 20% 80%, rgba(0,220,255,.05), transparent 55%);
  filter:blur(18px);
  animation:nebulaMove 18s ease-in-out infinite alternate;
}
@keyframes nebulaMove{
  from{transform:translate3d(-1.5%,-1%,0) scale(1.02)}
  to{transform:translate3d(1.5%,1%,0) scale(1.04)}
}

.stars{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  overflow:hidden;
}
.star{
  position:absolute;
  width:3px;
  height:3px;
  background:rgba(255,255,255,.35);
  border-radius:50%;
  animation:float 14s linear infinite;
  filter:drop-shadow(0 0 10px rgba(255,255,255,.25));
}
@keyframes float{
  from{transform:translateY(0)}
  to{transform:translateY(-120vh)}
}

.container{
  width:min(1200px,92%);
  margin:auto;
  padding:34px 0 60px;
  min-height:100vh;
}

.hero{
  text-align:center;
  margin-bottom:26px;
  padding-top:8px;
}
.hero h1{
  font-size:clamp(34px,5vw,60px);
  margin:0 0 8px;
}
.hero p{
  margin:0;
  color:var(--muted);
  font-size:15px;
}

.info-strip{
  display:grid;
  grid-template-columns:repeat(3,minmax(180px,1fr));
  gap:14px;
  margin:24px auto 24px;
  max-width:980px;
}
@media(max-width:860px){
  .info-strip{grid-template-columns:1fr}
}

.info-card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px 18px;
  text-align:center;
  backdrop-filter:blur(12px);
}
.info-card strong{
  display:block;
  font-size:28px;
  margin-bottom:4px;
}
.info-card span{
  color:var(--muted);
  font-size:13px;
}

.top-actions{
  margin:18px auto 0;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.pill{
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.08);
  color:#fff;
  border-radius:14px;
  padding:10px 14px;
  cursor:pointer;
  transition:.22s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:8px;
  user-select:none;
}
.pill:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,.14);
}
.pill:active{transform:translateY(0)}

section{
  margin-top:58px;
}
h2{
  text-align:center;
  margin:0 0 16px;
  font-size:30px;
}

.card{
  position:relative;
  overflow:hidden;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  isolation:isolate;
  backdrop-filter:blur(12px);
  transition:.25s;
}
.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:radial-gradient(650px circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,.18), transparent 45%);
  opacity:0;
  transition:.25s;
  z-index:-1;
}
.card:hover{
  transform:translateY(-6px);
  border-color:rgba(255,255,255,.22);
  box-shadow:0 20px 60px rgba(0,0,0,.40);
}
.card:hover::before{opacity:1}
.card h3{
  margin:0;
  font-size:18px;
  line-height:1.4;
}

/* מדורים */
.dept-grid{
  display:flex;
  flex-wrap:wrap;
  gap:16px;
  justify-content:center;
}
.dept-grid .card{
  cursor:default;
  flex:0 0 calc(25% - 12px);
  min-height:96px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.dept-grid .card:nth-child(n+5){
  flex:0 0 calc(33.333% - 12px);
}
@media(max-width:980px){
  .dept-grid .card,
  .dept-grid .card:nth-child(n+5){
    flex:0 0 calc(50% - 8px);
  }
}
@media(max-width:680px){
  .dept-grid .card,
  .dept-grid .card:nth-child(n+5){
    flex:0 0 100%;
  }
}

/* עולמות תוכן */
.worlds{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(3,minmax(0,1fr));
}
@media(max-width:980px){
  .worlds{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:680px){
  .worlds{grid-template-columns:1fr}
}
.world{
  cursor:pointer;
}
.world:hover{
  background:rgba(255,255,255,.10);
}

/* גאנט */
.gantt-wrap{
  background:rgba(10,12,22,.55);
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  padding:18px;
  backdrop-filter:blur(12px);
}

.gantt-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.gantt-top .note{
  color:var(--muted);
  font-size:13px;
}
.gantt-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.gantt{
  overflow:auto;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(0,0,0,.18);
  padding:14px;
}

.months{
  display:grid;
  grid-template-columns:240px repeat(12,110px);
  gap:10px;
  align-items:center;
}
.months .cell{
  color:rgba(255,255,255,.75);
  font-size:12.5px;
  text-align:center;
}
.months .left{
  text-align:right;
  padding-right:10px;
}

.row{
  display:grid;
  grid-template-columns:240px repeat(12,110px);
  gap:10px;
  align-items:center;
  margin-top:10px;
}
.task-meta{
  display:flex;
  flex-direction:column;
  gap:6px;
  padding-right:10px;
}
.task-title{
  font-weight:700;
}
.task-sub{
  color:var(--muted);
  font-size:12.5px;
}

.rail{
  grid-column:2 / span 12;
  position:relative;
  height:18px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  overflow:hidden;
}
.marker{
  position:absolute;
  top:0;
  width:2px;
  height:100%;
  background:rgba(255,255,255,.14);
}
.bar{
  position:absolute;
  top:2px;
  height:14px;
  border-radius:999px;
  box-shadow:0 10px 28px rgba(0,0,0,.35);
  cursor:pointer;
}

.holidays-list{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:12px 0 0;
}
.holi-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.82);
  font-size:12.5px;
  cursor:pointer;
}
.holi-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,220,120,.9);
  box-shadow:0 0 14px rgba(255,220,120,.45);
}

/* מודאל */
.modal{
  position:fixed;
  inset:0;
  display:none;
  place-items:center;
  background:rgba(0,0,0,.55);
  z-index:999;
  padding:18px;
}
.modal.show{display:grid}
.modal-card{
  width:min(560px,96%);
  background:rgba(15,20,45,.92);
  border:1px solid rgba(255,255,255,.14);
  border-radius:18px;
  padding:18px;
  box-shadow:0 24px 90px rgba(0,0,0,.6);
}
.modal-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.modal-title{
  margin:0;
  font-size:18px;
}
.modal-close{
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,.10);
  color:white;
  padding:8px 10px;
  border-radius:12px;
}
.modal-body{
  color:rgba(255,255,255,.80);
  margin-top:10px;
  line-height:1.6;
}
.modal-meta{
  color:rgba(255,255,255,.60);
  font-size:12.5px;
  margin-top:10px;
}

footer{
  margin-top:48px;
  text-align:center;
  color:rgba(255,255,255,.55);
  font-size:12px;
}
</style>
</head>

<body>
<div class="nebula"></div>
<div class="stars" id="stars"></div>

<div class="container">

  <section class="hero">
    <h1>יחידת המטה</h1>
    <p>אופק 324</p>
  </section>

  <div class="info-strip">
    <div class="info-card">

    </div>
    <div class="info-card">

<script>
const CSV_URL = "./gantt.csv";
const EXCEL_EDIT_URL = "#"; // שימי כאן קישור קבוע לאקסל אם יש

document.getElementById("btnEditExcel").href = EXCEL_EDIT_URL;

/* stars */
const stars = document.getElementById("stars");
for(let i=0;i<60;i++){
  const s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.style.animationDelay=Math.random()*12+"s";
  const size=2 + Math.random()*2.2;
  s.style.width=size+"px";
  s.style.height=size+"px";
  stars.appendChild(s);
}

/* hover glow */
function attachMouseGlow(card){
  card.addEventListener("mousemove",(e)=>{
    const r=card.getBoundingClientRect();
    card.style.setProperty("--mx",((e.clientX-r.left)/r.width)*100+"%");
    card.style.setProperty("--my",((e.clientY-r.top)/r.height)*100+"%");
  });
}

/* modal */
const modal=document.getElementById("modal");
const modalTitle=document.getElementById("modalTitle");
const modalBody=document.getElementById("modalBody");
const modalMeta=document.getElementById("modalMeta");

document.getElementById("modalClose").onclick=()=>modal.classList.remove("show");
modal.addEventListener("click",(e)=>{ if(e.target===modal) modal.classList.remove("show"); });

function openModal(title, body, meta=""){
  modalTitle.textContent=title;
  modalBody.textContent=body;
  modalMeta.textContent=meta;
  modal.classList.add("show");
}

/* departments - בלי טקסט נוסף */
const departments = [
  {title:"איתור והשמה"},
  {title:"מנהלה"},
  {title:"פיתוח רב מערכתי"},
  {title:'תו"ב'},
  {title:'חופ"ה'},
  {title:"סגל"},
  {title:"קריית התקשוב"}
];

const deptEl=document.getElementById("deptCards");
departments.forEach(d=>{
  const c=document.createElement("div");
  c.className="card";
  c.innerHTML = `<h3>${d.title}</h3>`;
  attachMouseGlow(c);
  deptEl.appendChild(c);
});

/* worlds */
const worlds = [
  {title:"אזרחים", link:"ezrahim.html"},
  {title:"מילואים", link:"miluim.html"},
  {title:"קצונה", link:"ktzina.html"},
  {title:'תהליכי משא"ן', link:"mashan.html"},
  {title:"סגל", link:"sagal.html"},
  {title:"אירועים וחינוך", link:"events.html"},
  {title:"קורסים", link:"courses.html"},
  {title:"רכב", link:"vehicle.html"},
  {title:"תקציבים ורכש", link:"budget.html"}
];

const worldsEl=document.getElementById("worldCards");
worlds.forEach(w=>{
  const c=document.createElement("div");
  c.className="card world";
  c.innerHTML=`<h3>${w.title}</h3>`;
  attachMouseGlow(c);
  if(w.link){
    c.onclick=()=>window.location=w.link;
  }
  worldsEl.appendChild(c);
});

/* CSV helpers */
function detectDelimiter(line){
  const commas = (line.match(/,/g) || []).length;
  const semicolons = (line.match(/;/g) || []).length;
  const tabs = (line.match(/\t/g) || []).length;
  return semicolons >= commas && semicolons >= tabs ? ";" : tabs >= commas && tabs >= semicolons ? "\t" : ",";
}

function normalizeHeader(value){
  return String(value || "")
    .replace(/^\uFEFF/, "")
    .replace(/[\u200E\u200F\u202A-\u202E]/g, "")
    .replace(/\u00A0/g, " ")
    .trim();
}

function splitCSVLine(line, delimiter){
  const result = [];
  let current = "";
  let inQuotes = false;

  for(let i = 0; i < line.length; i++){
    const char = line[i];
    const next = line[i + 1];

    if(char === '"'){
      if(inQuotes && next === '"'){
        current += '"';
        i++;
      }else{
        inQuotes = !inQuotes;
      }
    }else if(char === delimiter && !inQuotes){
      result.push(current);
      current = "";
    }else{
      current += char;
    }
  }

  result.push(current);
  return result.map(v => v.trim());
}

function headerIndex(headers, candidates){
  const normalized = headers.map(normalizeHeader);
  for(const candidate of candidates){
    const idx = normalized.indexOf(normalizeHeader(candidate));
    if(idx >= 0) return idx;
  }
  return -1;
}

function parseDate(value){
  const str = String(value || "").trim();
  if(!str) return null;

  let m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(m){
    return new Date(+m[3], +m[2]-1, +m[1]);
  }

  m = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){
    return new Date(+m[1], +m[2]-1, +m[3]);
  }

  return null;
}

function pickYear(tasks, holidays){
  for(const item of [...tasks, ...holidays]){
    const d = parseDate(item.start);
    if(d) return d.getFullYear();
  }
  return new Date().getFullYear();
}

function parseCSV(text){
  const cleaned = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  const lines = cleaned.split("\n").filter(line => line.trim().length > 0);

  if(lines.length < 2){
    throw new Error("קובץ CSV ריק או חסר נתונים.");
  }

  const delimiter = detectDelimiter(lines[0]);
  const headers = splitCSVLine(lines[0], delimiter).map(normalizeHeader);

  const iType  = headerIndex(headers, ["סוג", "Type"]);
  const iTitle = headerIndex(headers, ["משימה", "כותרת", "Title", "Task"]);
  const iDept  = headerIndex(headers, ["מדור מוביל", "מדור", "Dept", "Department"]);
  const iStart = headerIndex(headers, ["תאריך התחלה", "Start", "Start Date"]);
  const iEnd   = headerIndex(headers, ["תאריך סיום", "End", "End Date"]);
  const iDesc  = headerIndex(headers, ["תיאור", "Description", "Desc"]);

  if(iType < 0 || iTitle < 0 || iStart < 0){
    throw new Error('הכותרות לא זוהו. צריך לפחות: "סוג", "משימה", "תאריך התחלה".');
  }

  const tasks = [];
  const holidays = [];

  for(let i = 1; i < lines.length; i++){
    const cols = splitCSVLine(lines[i], delimiter);

    const type = normalizeHeader(cols[iType] || "");
    const title = String(cols[iTitle] || "").trim();
    const dept = iDept >= 0 ? String(cols[iDept] || "").trim() : "";
    const start = String(cols[iStart] || "").trim();
    const end = iEnd >= 0 ? String(cols[iEnd] || "").trim() : "";
    const desc = iDesc >= 0 ? String(cols[iDesc] || "").trim() : "";

    if(!type || !title || !start) continue;

    const item = {
      title,
      dept,
      start,
      end: end || start,
      desc
    };

    if(type === "חג" || type.toLowerCase() === "holiday"){
      holidays.push(item);
    }else{
      tasks.push(item);
    }
  }

  return {
    tasks,
    holidays,
    year: pickYear(tasks, holidays)
  };
}

/* gantt */
const monthsHe=["ינו","פבר","מרץ","אפר","מאי","יונ","יול","אוג","ספט","אוק","נוב","דצ"];
const deptColors={
  "איתור והשמה":"#4CC9F0",
  "מנהלה":"#7B61FF",
  "פיתוח רב מערכתי":"#00E5A8",
  'תו"ב':"#FFB703",
  'חופ"ה':"#FB5607",
  "סגל":"#F72585",
  "קריית התקשוב":"#3A86FF",
  "":"#4CC9F0"
};

function renderGantt(data){
  const {year, tasks, holidays} = data;

  const monthsRow = document.getElementById("monthsRow");
  monthsRow.innerHTML = "";

  const left = document.createElement("div");
  left.className = "cell left";
  left.textContent = "משימות";
  monthsRow.appendChild(left);

  for(let m = 0; m < 12; m++){
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.textContent = monthsHe[m];
    monthsRow.appendChild(cell);
  }

  const rows = document.getElementById("rows");
  rows.innerHTML = "";

  const holidaysList = document.getElementById("holidaysList");
  holidaysList.innerHTML = "";

  if(tasks.length === 0){
    document.getElementById("ganttStatus").textContent = `לא נמצאו משימות בקובץ (שנה ${year}).`;
  }else{
    document.getElementById("ganttStatus").textContent = `נטענו ${tasks.length} משימות + ${holidays.length} חגים/חופשות (שנה ${year}).`;
  }

  const yearStart = new Date(year, 0, 1);
  const yearEnd = new Date(year, 11, 31);
  const dayMs = 1000 * 60 * 60 * 24;
  const totalDays = Math.floor((yearEnd - yearStart) / dayMs) + 1;

  function clampDate(date){
    if(date < yearStart) return yearStart;
    if(date > yearEnd) return yearEnd;
    return date;
  }

  tasks.forEach(task => {
    const rawStart = parseDate(task.start);
    const rawEnd = parseDate(task.end) || rawStart;

    if(!rawStart) return;

    const start = clampDate(rawStart);
    const end = clampDate(rawEnd);

    const startDay = Math.floor((start - yearStart) / dayMs);
    const endDay = Math.floor((end - yearStart) / dayMs);

    const leftPct = (startDay / totalDays) * 100;
    const widthPct = Math.max(1.2, ((endDay - startDay + 1) / totalDays) * 100);

    const row = document.createElement("div");
    row.className = "row";
    row.style.cursor = "pointer";

    const meta = document.createElement("div");
    meta.className = "task-meta";
    meta.innerHTML = `
      <div class="task-title">${task.title}</div>
      <div class="task-sub">${task.dept || "—"} · ${task.start}${task.end ? " – " + task.end : ""}</div>
    `;
    row.appendChild(meta);

    const rail = document.createElement("div");
    rail.className = "rail";

    for(let m = 1; m < 12; m++){
      const marker = document.createElement("div");
      marker.className = "marker";
      marker.style.left = (m / 12 * 100) + "%";
      rail.appendChild(marker);
    }

    const bar = document.createElement("div");
    bar.className = "bar";
    bar.style.left = leftPct + "%";
    bar.style.width = widthPct + "%";
    bar.style.background = deptColors[task.dept] || "#4CC9F0";
    bar.title = `${task.title} (${task.start} - ${task.end || task.start})`;

    rail.appendChild(bar);

    const cell = document.createElement("div");
    cell.style.gridColumn = "2 / span 12";
    cell.appendChild(rail);
    row.appendChild(cell);

    row.onclick = () => {
      openModal(
        task.title,
        task.desc || "אין תיאור.",
        `${task.dept || "—"} · ${task.start}${task.end ? " – " + task.end : ""}`
      );
    };

    rows.appendChild(row);
  });

  holidays.forEach(h => {
    const chip = document.createElement("div");
    chip.className = "holi-chip";
    chip.innerHTML = `
      <span class="holi-dot"></span>
      <span>${h.title}</span>
      <span style="opacity:.7">(${h.start}${h.end ? "–" + h.end : ""})</span>
    `;
    chip.onclick = () => {
      openModal(
        h.title,
        h.desc || "—",
        `${h.start}${h.end ? " – " + h.end : ""}`
      );
    };
    holidaysList.appendChild(chip);
  });
}

async function loadFromUrl(){
  const status = document.getElementById("ganttStatus");

  try{
    status.textContent = "טוען CSV…";

    const res = await fetch(CSV_URL, { cache: "no-store" });
    if(!res.ok){
      throw new Error("לא הצלחתי לטעון את הקובץ: " + res.status);
    }

    const text = await res.text();
    const data = parseCSV(text);
    renderGantt(data);
  }catch(err){
    status.textContent = "שגיאה בטעינת הגאנט: " + err.message;
    console.error(err);
  }
}

document.getElementById("btnRefresh").onclick = loadFromUrl;
loadFromUrl();
</script>
</body>
